server:
  port: 8085

spring:
  application:
    name: rag-agent

  servlet:
    multipart:
      max-file-size: ${RAG_UPLOAD_MAX_FILE_SIZE:50MB}
      max-request-size: ${RAG_UPLOAD_MAX_REQUEST_SIZE:200MB}

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/agent_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: 0

user-service:
  url: ${USER_SERVICE_URI:http://localhost:8081}

app:
  internal-service-key: ${INTERNAL_SERVICE_KEY:change-me-in-production}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

rag:
  storage:
    provider: ${RAG_STORAGE_PROVIDER:minio}
    minio:
      endpoint: ${RAG_MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ROOT_USER:minioadmin}
      secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
      bucket: ${RAG_DOCUMENT_BUCKET:rag-documents}
  index:
    chunk-size-tokens: ${RAG_CHUNK_SIZE_TOKENS:700}
    chunk-overlap-tokens: ${RAG_CHUNK_OVERLAP_TOKENS:100}
  vector-store:
    provider: ${RAG_VECTOR_STORE_PROVIDER:milvus}
    milvus:
      host: ${MILVUS_HOST:localhost}
      port: ${MILVUS_PORT:19530}
      token: ${MILVUS_TOKEN:}
      collection-name: ${RAG_MILVUS_COLLECTION:rag_document_chunks}
      dimension: ${RAG_EMBEDDING_DIM:768}
      metric-type: ${RAG_VECTOR_METRIC:COSINE}
      index-type: ${RAG_VECTOR_INDEX:HNSW}
  embedding:
    active-profile: ${RAG_EMBEDDING_ACTIVE_PROFILE:local-bge-m3}
    provider: ${RAG_EMBEDDING_PROVIDER:mock}
    endpoint: ${RAG_EMBEDDING_ENDPOINT:}
    api-key: ${RAG_EMBEDDING_API_KEY:}
    model: ${RAG_EMBEDDING_MODEL:}
    dimension: ${RAG_EMBEDDING_DIM:768}
    timeout-ms: ${RAG_EMBEDDING_TIMEOUT_MS:10000}
    profiles:
      local:
        endpoint: ${RAG_LOCAL_EMBEDDING_ENDPOINT:${RAG_EMBEDDING_ENDPOINT:http://localhost:8091/embed}}
        model: ${RAG_LOCAL_EMBEDDING_MODEL:BAAI/bge-m3}
        dimension: ${RAG_LOCAL_EMBEDDING_DIM:1024}
        timeout-ms: ${RAG_LOCAL_EMBEDDING_TIMEOUT_MS:${RAG_EMBEDDING_TIMEOUT_MS:30000}}
        collection-name: ${RAG_LOCAL_MILVUS_COLLECTION:rag_document_chunks_bge_m3}
      qwen:
        endpoint: ${RAG_QWEN_EMBEDDING_ENDPOINT:}
        api-key: ${RAG_QWEN_EMBEDDING_API_KEY:${RAG_EMBEDDING_API_KEY:}}
        model: ${RAG_QWEN_EMBEDDING_MODEL:text-embedding-v4}
        dimension: ${RAG_QWEN_EMBEDDING_DIM:1024}
        timeout-ms: ${RAG_QWEN_EMBEDDING_TIMEOUT_MS:${RAG_EMBEDDING_TIMEOUT_MS:30000}}
        collection-name: ${RAG_QWEN_MILVUS_COLLECTION:rag_document_chunks_qwen_v4_1024}
  llm:
    provider: ${RAG_LLM_PROVIDER:mock}
    api-key: ${RAG_LLM_API_KEY:${DEEPSEEK_API_KEY:}}
    base-url: ${RAG_LLM_BASE_URL:${DEEPSEEK_BASE_URL:https://maas-api.cn-huabei-1.xf-yun.com/v2}}
    model: ${RAG_LLM_MODEL:${DEEPSEEK_MODEL:xopdeepseekv32}}
    timeout-ms: ${RAG_LLM_TIMEOUT_MS:30000}
    temperature: ${RAG_LLM_TEMPERATURE:0.2}
    max-tokens: ${RAG_LLM_MAX_TOKENS:1200}

logging:
  level:
    com.agent.rag: DEBUG
