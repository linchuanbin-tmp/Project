server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        # User service route
        - id: user-service
          uri: ${USER_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/user/**,/api/admin/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@ipKeyResolver}"

        # Task service route
        - id: task-service
          uri: ${TASK_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/task/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"

        # Tool Agent HTTP route
        - id: tool-agent
          uri: ${TOOL_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/tool/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"

        # Task Service WebSocket route
        - id: task-ws
          uri: ${TASK_SERVICE_WS_URI:ws://localhost:8082}
          predicates:
            - Path=/ws/task/**
          filters:
            - StripPrefix=2

        # Code Agent route
        - id: code-agent
          uri: ${CODE_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/code/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@ipKeyResolver}"

        # RAG Agent route
        - id: rag-agent
          uri: ${RAG_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/rag/**
          filters:
            - StripPrefix=1

        # Dashboard Intent Router route
        - id: dashboard-route
          uri: ${CODE_AGENT_PYTHON_BASE_URL:http://localhost:8090}
          predicates:
            - Path=/api/dashboard/route
          filters:
            - SetPath=/route

  redis:
    host: localhost
    port: 6379
    password:
    database: 0

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

# JWT configuration (overridden by JWT_SECRET environment variable)
jwt:
  secret: ${JWT_SECRET:your-secret-key-here-change-in-production}
