server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        # 用户中心路由
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@ipKeyResolver}"

        # 任务中心路由
        - id: task-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/task/**
          filters:
            - StripPrefix=1

        # Tool Agent HTTP 路由
        - id: tool-agent
          uri: http://localhost:8083
          predicates:
            - Path=/api/tool/**
          filters:
            - StripPrefix=1

        # Code Agent 路由（Text-to-SQL）
        - id: code-agent
          uri: http://localhost:8084
          predicates:
            - Path=/api/code/**
          filters:
            - StripPrefix=1

        # Tool Agent WebSocket 路由（关键修改）
        - id: tool-ws
          uri: ws://localhost:8083
          predicates:
            - Path=/ws/**
          filters:
            - SetPath=/tool/ws

  redis:
    host: localhost
    port: 6379
    password:
    database: 0

logging:
  level:
    org.springframework.cloud.gateway: DEBUG