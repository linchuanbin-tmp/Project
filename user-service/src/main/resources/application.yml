    url: jdbc:mysql://localhost:3306/agent_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

# JWT配置（Docker 环境由 JWT_SECRET / JWT_EXPIRATION 环境变量覆盖）
jwt:
  secret: ${JWT_SECRET:your-secret-key-here-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}

# API Key 配置（敏感信息，通过环境变量或 .env 注入）
# 本地开发：在 IDE 运行配置中设置 DEEPSEEK_API_KEY 和 DEEPSEEK_OFFICIAL_API_KEY
# Docker：由 docker-compose 从 .env 注入
app:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
  deepseek-official:
    api-key: ${DEEPSEEK_OFFICIAL_API_KEY:}
  encryption:
    password: ${APP_ENCRYPTION_PASSWORD:change-me-in-production}
    salt: ${APP_ENCRYPTION_SALT:deadbeef}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml