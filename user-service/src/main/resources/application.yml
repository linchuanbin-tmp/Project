server:
  port: 8081

spring:
  application:
    name: user-service
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # Local dev defaults to localhost; Docker overrides via SPRING_DATASOURCE_URL from docker-compose
    url: jdbc:mysql://localhost:3306/agent_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

# JWT configuration (overridden by JWT_SECRET / JWT_EXPIRATION env vars in Docker)
jwt:
  secret: ${JWT_SECRET:your-secret-key-here-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}

# API Key configuration (sensitive, injected via environment or .env)
# Local dev: set DEEPSEEK_API_KEY in IDE run config
# Docker: injected by docker-compose from .env
app:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
  encryption:
    password: ${APP_ENCRYPTION_PASSWORD:change-me-in-production}
    salt: ${APP_ENCRYPTION_SALT:deadbeef}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# Resend Email Service
resend:
  api-key: ${RESEND_API_KEY:}
  from: ${RESEND_FROM:BankAgent <noreply@bankagent.online>}

# MinIO Object Storage
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ROOT_USER:minioadmin}
  secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
  bucket: ${MINIO_BUCKET:rag-documents}
