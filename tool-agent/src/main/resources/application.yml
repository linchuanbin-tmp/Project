server:
  port: 8083

spring:
  application:
    name: tool-agent

  datasource:
    url: jdbc:mysql://localhost:3306/agent_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.agent.tool.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# DeepSeek API 配置（Docker 环境由 AI_DEEPSEEK_API_KEY 等环境变量覆盖）
ai:
  deepseek:
    api-key: ${AI_DEEPSEEK_API_KEY:2a62ecda76e5be506cbf442160539507:OWVkYWYzZTE2NDBkNmNjOThjNzNmMzYx}
    base-url: ${AI_DEEPSEEK_BASE_URL:https://maas-api.cn-huabei-1.xf-yun.com/v2}
    model: ${AI_DEEPSEEK_MODEL:xopdeepseekv32}
    timeout: 6000

# 高德地图（Docker 环境由 AMAP_KEY 环境变量覆盖）
amap:
  key: ${AMAP_KEY:f5a3d5e1af9c992f925692aae7b04115}

logging:
  level:
    com.agent.tool: DEBUG
    org.springframework.web.reactive.function.client: DEBUG