server:
  port: 8083

spring:
  application:
    name: tool-agent

  datasource:
    url: jdbc:mysql://localhost:3306/agent_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.agent.tool.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# LLM API configuration (overridden by environment variables in Docker)
ai:
  deepseek:
    api-key: ${AI_DEEPSEEK_API_KEY:}
    base-url: ${AI_DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${AI_DEEPSEEK_MODEL:deepseek-chat}
    timeout: 120000

# AMap (overridden by AMAP_KEY env var in Docker)
amap:
  key: ${AMAP_KEY:}

logging:
  level:
    com.agent.tool: DEBUG
    org.springframework.web.reactive.function.client: DEBUG