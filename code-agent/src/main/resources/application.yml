server:
  port: 8084

spring:
  application:
    name: code-agent
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/agent_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:zzm20030718}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# Code Agent 配置
code-agent:
  # LLM 推理（通过 Python 推理服务调用）
  onnx:
    model-path: classpath:models/text2sql.onnx
    server-url: ${CODE_AGENT_PYTHON_URL:http://localhost:8090/infer}
    enabled: ${CODE_AGENT_ONNX_ENABLED:true}  # true = LLM 推理, false = 模板引擎 fallback
  # SQL 白名单配置
  whitelist:
    # 只允许这些操作
    allowed-operations:
      - SELECT
    # 禁止的关键字（额外的安全检查）
    forbidden-keywords:
      - DROP
      - DELETE
      - INSERT
      - UPDATE
      - ALTER
      - TRUNCATE
      - CREATE
      - EXEC
      - EXECUTE
      - UNION
      - INTO
      - LOAD_FILE
      - OUTFILE
      - DUMPFILE
    # 允许的最大表数量（防止复杂 JOIN 攻击）
    max-tables-per-query: 3
    # 允许的最大条件数
    max-conditions: 10
  # 元数据缓存
  metadata:
    # 缓存过期时间（秒）
    cache-ttl: 3600
    # 缓存 key 前缀
    cache-prefix: "code_agent:metadata:"

# 日志
logging:
  level:
    com.agent.code: DEBUG
    com.microsoft.onnxruntime: INFO
