server:
  port: 8084

spring:
  application:
    name: code-agent
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/agent_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# Code Agent configuration
code-agent:
  # LLM inference (via Python inference server)
  onnx:
    model-path: classpath:models/text2sql.onnx
    server-url: ${CODE_AGENT_PYTHON_URL:http://localhost:8090/infer}
    enabled: ${CODE_AGENT_ONNX_ENABLED:true}  # true = LLM inference, false = template engine fallback
  # SQL whitelist configuration
  whitelist:
    # Only allow these operations
    allowed-operations:
      - SELECT
    # Forbidden keywords (additional safety check)
    forbidden-keywords:
      - DROP
      - DELETE
      - INSERT
      - UPDATE
      - ALTER
      - TRUNCATE
      - CREATE
      - EXEC
      - EXECUTE
      - UNION
      - INTO
      - LOAD_FILE
      - OUTFILE
      - DUMPFILE
    # Max number of tables per query (prevents complex JOIN attacks)
    max-tables-per-query: 3
    # Max number of conditions
    max-conditions: 10
  # Metadata cache
  metadata:
    # Cache expiration (seconds)
    cache-ttl: 3600
    # Cache key prefix
    cache-prefix: "code_agent:metadata:"

# Logging
logging:
  level:
    com.agent.code: DEBUG
    com.microsoft.onnxruntime: INFO
